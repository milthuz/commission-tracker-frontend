name: Create Release

on:
  # Triggered from Admin Panel via GitHub API
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.2.6)'
        required: true
      release_notes:
        description: 'Release notes (markdown)'
        required: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Bump version in package.json
        run: |
          npm version ${{ github.event.inputs.version }} --no-git-tag-version
          npm install --package-lock-only

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to v${{ github.event.inputs.version }}"
          git push origin main

      - name: Create and push tag
        run: |
          git tag v${{ github.event.inputs.version }}
          git push origin v${{ github.event.inputs.version }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.event.inputs.version }}
          release_name: v${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.release_notes }}
          draft: false
          prerelease: false

      - name: Build project
        run: |
          npm ci
          npm run build

      - name: Deployment notification
        run: |
          echo "✅ Release v${{ github.event.inputs.version }} created"
          echo "🌐 Netlify will auto-deploy from main branch"
